# .github/workflows/ci.yml

name: CI/CD Pipeline

# ─── Trigger Configuration ─────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Permissions ────────────────────────────────────────────────
# Least-privilege: only grant what each job needs
permissions:
  contents: read
  packages: write        # needed to push to GHCR
  pull-requests: write   # needed to post coverage comments

# ─── Pipeline Jobs ──────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════
  # JOB 1: TEST
  # Runs pytest with coverage, linting with ruff
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip packages to speed up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Run full test suite with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=report.xml \
            -v

      - name: Publish test results to PR comment
        if: always() && matrix.python-version == '3.12' && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: report.xml
          check_name: Test Results (Python 3.12)
          comment_mode: always
          compare_to_earlier_commit: true

      # Upload coverage report as an artifact so you can download it
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: SECURITY SCAN
  # Runs Bandit (SAST) and Safety (dependency vulnerabilities)
  # Only runs after tests pass
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test  # Gate: only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Bandit: Static Application Security Testing
      # Scans your code for common security issues
      - name: Run Bandit (SAST)
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium || true
          # Display results in the log
          bandit -r app/ --severity-level medium

      # Safety: Dependency vulnerability scanning
      # Checks requirements against a CVE database
      - name: Run Safety (dependency check)
        run: |
          safety check \
            -r requirements.txt \
            --output json > safety-report.json || true
          # Display results in the log
          safety check -r requirements.txt || true
        # Note: `|| true` prevents the job from failing on advisories.
        # In production, you'd remove `|| true` and treat vulnerabilities
        # as hard failures, or filter by severity.

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: BUILD & PUSH
  # Builds Docker image and pushes to GitHub Container Registry
  # Only runs on main branch (not on PRs) after security passes
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]  # Gate: only runs if BOTH pass

    # Only build on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GHCR uses the GITHUB_TOKEN — no separate registry credentials needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags: latest + git SHA for traceability
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Select build strategy
        id: strategy
        run: |
          if [ "${{ vars.DEPLOY_TARGET }}" = "aws" ]; then
            echo "use_buildx=true" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "use_buildx=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.strategy.outputs.use_buildx == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.strategy.outputs.use_buildx == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image (AWS)
        if: steps.strategy.outputs.use_buildx == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ steps.strategy.outputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner (AWS multi-arch)
        if: steps.strategy.outputs.use_buildx == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # Build locally first so Trivy can scan before push
      - name: Build Docker image (local)
        if: steps.strategy.outputs.use_buildx != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        if: steps.strategy.outputs.use_buildx != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        if: steps.strategy.outputs.use_buildx != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image details
        run: |
          echo "Image pushed to: ghcr.io/${{ github.repository }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy
        run: |
          echo "Deploying image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # This is where kubectl apply or ArgoCD sync would go